<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mega Millions Fluid Forecast</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body style="margin:0;background:#060f1a;">
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useRef, useState } = React;

      const BALL_COUNT = 70;
      const MEGA_BALL_COUNT = 25;

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function generatePick() {
        const numbers = new Set();
        while (numbers.size < 5) numbers.add(randomInt(1, BALL_COUNT));
        return {
          numbers: Array.from(numbers).sort((a, b) => a - b),
          megaBall: randomInt(1, MEGA_BALL_COUNT),
        };
      }

      function FluidBall({ value, isMega, style }) {
        return (
          <div style={{
            display: "inline-flex", alignItems: "center", justifyContent: "center",
            width: 56, height: 56, borderRadius: "50%",
            background: isMega
              ? "radial-gradient(circle at 35% 35%, #ff9a3c, #c0392b)"
              : "radial-gradient(circle at 35% 35%, #4fc3f7, #1565c0)",
            color: "#fff", fontWeight: "bold", fontSize: 20,
            boxShadow: isMega ? "0 4px 16px rgba(192,57,43,0.5)" : "0 4px 16px rgba(21,101,192,0.4)",
            margin: "0 6px", transition: "transform 0.3s ease", ...style,
          }}>
            {value}
          </div>
        );
      }

      function WaveCanvas({ active }) {
        const canvasRef = useRef(null);
        const animRef = useRef(null);
        useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext("2d");
          let t = 0;
          function draw() {
            const { width, height } = canvas;
            ctx.clearRect(0, 0, width, height);
            for (let wave = 0; wave < 3; wave++) {
              ctx.beginPath();
              const amp = active ? 18 - wave * 4 : 6 - wave;
              const freq = 0.04 + wave * 0.01;
              const speed = active ? 0.06 + wave * 0.02 : 0.02;
              const yBase = height * (0.45 + wave * 0.12);
              const alpha = active ? 0.35 - wave * 0.08 : 0.15 - wave * 0.03;
              ctx.moveTo(0, yBase);
              for (let x = 0; x <= width; x++) {
                ctx.lineTo(x, yBase + Math.sin(x * freq + t * (speed * 60)) * amp);
              }
              ctx.lineTo(width, height);
              ctx.lineTo(0, height);
              ctx.closePath();
              ctx.fillStyle = `rgba(79,195,247,${alpha})`;
              ctx.fill();
            }
            t += 1 / 60;
            animRef.current = requestAnimationFrame(draw);
          }
          animRef.current = requestAnimationFrame(draw);
          return () => cancelAnimationFrame(animRef.current);
        }, [active]);
        return (
          <canvas ref={canvasRef} width={520} height={160}
            style={{ display: "block", width: "100%", borderRadius: 12 }} />
        );
      }

      function MegaMillionsFluid() {
        const [pick, setPick] = useState(null);
        const [animating, setAnimating] = useState(false);
        const [history, setHistory] = useState([]);

        function handleDraw() {
          setAnimating(true);
          setPick(null);
          setTimeout(() => {
            const result = generatePick();
            setPick(result);
            setHistory(prev => [result, ...prev].slice(0, 5));
            setAnimating(false);
          }, 1200);
        }

        return (
          <div style={{
            maxWidth: 560, margin: "40px auto", fontFamily: "system-ui, sans-serif",
            background: "#0d1b2a", borderRadius: 20, padding: 32,
            boxShadow: "0 8px 40px rgba(0,0,0,0.6)", color: "#e0f7fa",
          }}>
            <h1 style={{ textAlign: "center", fontSize: 26, letterSpacing: 1, marginBottom: 4, color: "#4fc3f7" }}>
              Mega Millions
            </h1>
            <p style={{ textAlign: "center", color: "#78909c", fontSize: 13, marginBottom: 24 }}>
              Fluid Dynamics Forecast
            </p>

            <WaveCanvas active={animating} />

            <div style={{ textAlign: "center", margin: "28px 0 20px" }}>
              {pick && !animating ? (
                <div>
                  <div style={{ display: "flex", justifyContent: "center", alignItems: "center", flexWrap: "wrap", gap: 4 }}>
                    {pick.numbers.map(n => <FluidBall key={n} value={n} />)}
                    <span style={{ color: "#78909c", fontSize: 22, margin: "0 4px" }}>+</span>
                    <FluidBall value={pick.megaBall} isMega />
                  </div>
                  <p style={{ color: "#78909c", fontSize: 12, marginTop: 12 }}>
                    White balls &nbsp;|&nbsp; <span style={{ color: "#ff9a3c" }}>Mega Ball</span>
                  </p>
                </div>
              ) : animating ? (
                <div style={{ color: "#4fc3f7", fontSize: 16, letterSpacing: 2 }}>Simulating fluid dynamics…</div>
              ) : (
                <div style={{ color: "#546e7a", fontSize: 15 }}>Press <strong>Draw</strong> to generate a pick</div>
              )}
            </div>

            <div style={{ textAlign: "center" }}>
              <button onClick={handleDraw} disabled={animating} style={{
                padding: "12px 40px", fontSize: 16, borderRadius: 30, border: "none",
                background: animating ? "#37474f" : "linear-gradient(135deg, #1565c0, #4fc3f7)",
                color: "#fff", cursor: animating ? "not-allowed" : "pointer",
                boxShadow: animating ? "none" : "0 4px 18px rgba(79,195,247,0.4)",
                transition: "all 0.2s",
              }}>
                {animating ? "Drawing…" : "Draw"}
              </button>
            </div>

            {history.length > 0 && (
              <div style={{ marginTop: 32 }}>
                <h3 style={{ fontSize: 13, color: "#546e7a", marginBottom: 12, textTransform: "uppercase", letterSpacing: 1 }}>
                  Recent Picks
                </h3>
                {history.map((h, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8, opacity: 1 - i * 0.15 }}>
                    {h.numbers.map(n => <FluidBall key={n} value={n} style={{ width: 36, height: 36, fontSize: 13 }} />)}
                    <span style={{ color: "#546e7a", fontSize: 14 }}>+</span>
                    <FluidBall value={h.megaBall} isMega style={{ width: 36, height: 36, fontSize: 13 }} />
                  </div>
                ))}
              </div>
            )}

            <p style={{ textAlign: "center", color: "#37474f", fontSize: 11, marginTop: 28 }}>
              For entertainment only. Results are randomly generated.
            </p>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<MegaMillionsFluid />);
    </script>
  </body>
</html>
